apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-deployment
  labels:
    app: nexus-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-router
  template:
    metadata:
      labels:
        app: nexus-router
    spec:
      containers:
        - name: router
          image: nexus-router:production
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: QDRANT_HOST
              value: "qdrant"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            # 🌉 The Bridge to your Windows Ollama!
            - name: OLLAMA_HOST
              value: "http://172.17.0.1:11434"
            - name: OLLAMA_BASE_URL
              value: "http://172.17.0.1:11434"
        - name: qdrant-proxy
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            [
              "apk add --no-cache socat && socat TCP-LISTEN:6333,fork TCP:qdrant:6333",
            ]
        - name: redis-proxy
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            [
              "apk add --no-cache socat && socat TCP-LISTEN:6379,fork TCP:redis:6379",
            ]
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-router
spec:
  selector:
    app: nexus-router
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
