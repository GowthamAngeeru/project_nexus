apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  labels:
    app: nexus-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-gateway
  template:
    metadata:
      labels:
        app: nexus-gateway
    spec:
      containers:
        - name: gateway
          image: nexus-gateway:production
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          # 🎯 The Shotgun Approach: Explicitly routing expected hostnames to our K8s services!
          env:
            - name: ROUTER_URL
              value: "http://nexus-router:8001"
            - name: ROUTER_HOST
              value: "nexus-router"
            - name: SWARM_URL
              value: "http://nexus-swarm:8002"
            - name: SWARM_HOST
              value: "nexus-swarm"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: REDIS_HOST
              value: "redis"
        # 🥷 1. Intercepts local Redis calls
        - name: redis-proxy
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            [
              "apk add --no-cache socat && socat TCP-LISTEN:6379,fork TCP:redis:6379",
            ]
        # 🥷 2. THE MISSING LINK: Intercepts local Router calls
        - name: router-proxy
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            [
              "apk add --no-cache socat && socat TCP-LISTEN:8001,fork TCP:nexus-router:8001",
            ]
        # 🥷 3. THE MISSING LINK: Intercepts local Swarm calls
        - name: swarm-proxy
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            [
              "apk add --no-cache socat && socat TCP-LISTEN:8002,fork TCP:nexus-swarm:8002",
            ]
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-gateway
spec:
  selector:
    app: nexus-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
