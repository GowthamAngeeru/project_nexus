version: "3.8"

services:
  # L2 Cache for Gateway Latency
  redis-cache:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Vector Database for ML Routing
  qdrant-vector-db:
    image: qdrant/qdrant:latest
    container_name: nexus_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped


volumes:
  redis_data:
  qdrant_data:
